name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm install

      - name: Syntax check
        run: npm run check:syntax

      - name: Unit tests
        run: npm test

      - name: Vercel serverless function count (Hobby plan limit)
        run: npm run check:functions

      # Not a duplicate of the weekly kb-freshness workflow. That one asks
      # "has this data gone stale over time"; this one blocks a PR that
      # breaks the metadata the staleness check depends on — a missing or
      # unparseable lastUpdated used to pass silently.
      - name: Knowledge base review metadata
        run: npm run check:kb-freshness
