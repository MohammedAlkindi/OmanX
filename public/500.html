<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png" />
    <link rel="icon" type="image/svg+xml" href="/assets/icon.svg" />
    <link rel="manifest" href="/assets/site.webmanifest" />
    <title>Temporary Issue · OmanX</title>
    <meta name="description" content="OmanX encountered a temporary issue." />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="error-page">
    <main class="container error-shell" role="main">
      <p class="error-code">500</p>
      <h1>We hit a temporary issue.</h1>
      <p data-error-message>Something went wrong on our side. Please try again shortly.</p>
      <div class="error-actions">
        <a class="btn" href="/">Go to homepage</a>
        <a class="btn-secondary" href="/workspace">Open workspace</a>
      </div>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const message = params.get('message');
      if (message) {
        const target = document.querySelector('[data-error-message]');
        if (target) {
          target.textContent = message;
        }
      }
    </script>
  </body>
</html>
