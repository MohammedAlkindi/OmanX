<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="OmanX">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dcc88e"/>
      <stop offset="100%" stop-color="#b8935a"/>
    </linearGradient>
    <clipPath id="c">
      <circle cx="32" cy="32" r="16"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="13" fill="#141412"/>
  <!-- O ring -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="url(#g)" stroke-width="4.5"/>
  <!-- X arms clipped to ring interior -->
  <g clip-path="url(#c)">
    <line x1="10" y1="10" x2="54" y2="54" stroke="url(#g)" stroke-width="4.5"/>
    <line x1="54" y1="10" x2="10" y2="54" stroke="url(#g)" stroke-width="4.5"/>
  </g>
</svg>
