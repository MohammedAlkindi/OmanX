<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmanX Workspace</title>
    <meta name="description" content="Structured workspace for policy-aware decision guidance." />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container navbar">
        <a class="brandmark" href="/">OmanX</a>
        <nav class="nav-links" aria-label="Primary">
          <a class="nav-link" href="/system">System</a>
          <a class="nav-link" href="/method">Method</a>
          <a class="nav-link" href="/vision">Vision</a>
          <a class="nav-link" href="/contact">Contact</a>
        </nav>
        <div class="nav-actions"><a class="btn-secondary" href="/">Home</a></div>
      </div>
    </header>

    <main class="page-shell">
      <div class="container app-layout">
        <aside class="card sidebar" data-chat-sidebar>
          <div class="sidebar-header">
            <div>
              <div class="muted">Conversations</div>
              <h3>Decision history</h3>
            </div>
            <button class="btn" data-new-chat type="button">New</button>
          </div>
          <label class="muted" for="chat-search">Search</label>
          <input id="chat-search" class="sidebar-search" data-chat-search type="search" placeholder="Search conversations" />
          <div class="row-between muted"><span>Local continuity</span><span>Structured outputs</span></div>
          <div class="chat-list" data-chat-list></div>
        </aside>

        <section class="card assistant-shell" aria-label="Decision workspace">
          <header class="chat-header">
            <div>
              <h1 data-chat-title>Decision workspace</h1>
              <p data-chat-subtitle>Structured outputs with policy-aware framing.</p>
            </div>
            <div class="chat-actions-wrap">
              <button class="btn-secondary" data-copy-last type="button">Copy last</button>
              <button class="btn-secondary" data-export-chat type="button">Export</button>
              <button class="btn-secondary" data-rename-chat type="button">Rename</button>
              <button class="btn-secondary" data-delete-chat type="button">Delete</button>
            </div>
          </header>

          <section class="chat-body" data-message-list></section>

          <form class="composer" data-chat-form>
            <div class="card composer-box">
              <label class="muted" for="chat-input">Your decision question</label>
              <textarea id="chat-input" data-chat-input placeholder="Describe your decision context, constraints, and timeline."></textarea>
              <div class="composer-footer">
                <div class="status-inline"><i></i><span>Local save enabled. API used when available.</span></div>
                <div>Press <span class="kbd">Enter</span> to send</div>
                <button class="btn" type="submit">Send</button>
              </div>
            </div>
          </form>
        </section>
      </div>
    </main>

    <script type="module" src="/js/chat-page.js"></script>
  </body>
</html>
