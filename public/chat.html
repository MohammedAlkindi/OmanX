<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png" />
    <link rel="icon" type="image/svg+xml" href="/assets/icon.svg" />
    <link rel="manifest" href="/assets/site.webmanifest" />
    <title>OmanX Workspace</title>
    <meta name="description" content="Structured workspace for policy-aware decision guidance." />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- Navigation — sticky, frosted -->
    <nav>
      <a class="nav-logo" href="/">Oman<span>X</span></a>
      <div class="nav-right">
        <a class="nav-cta" href="/">← Home</a>
        <button class="nav-hamburger" data-mobile-toggle aria-label="Open menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
      <div class="nav-drawer" data-mobile-panel>
        <a href="/">Home</a>
        <a href="/workspace">Product</a>
        <a href="/system">System</a>
        <a href="/vision">Roadmap</a>
        <a href="/contact">Contact</a>
      </div>
    </nav>

    <main class="page-shell">
      <div class="container app-layout">

        <!-- Sidebar — conversation history -->
        <aside class="sidebar" data-chat-sidebar>
          <div class="sidebar-header">
            <div>
              <div class="muted">Conversations</div>
              <h3>Decision history</h3>
            </div>
            <button class="btn" data-new-chat type="button" style="height:32px;padding:0 14px;font-size:0.8125rem;">New</button>
          </div>

          <label class="muted" for="chat-search">Search</label>
          <input id="chat-search" class="sidebar-search" data-chat-search type="search" placeholder="Search conversations" />

          <div class="row-between">
            <span class="muted">Local continuity</span>
            <span class="muted">Structured outputs</span>
          </div>

          <div class="chat-list" data-chat-list></div>
        </aside>

        <!-- Main chat area -->
        <section class="assistant-shell" aria-label="Decision workspace">
          <header class="chat-header">
            <div>
              <h1 data-chat-title>Decision workspace</h1>
              <p data-chat-subtitle>Structured outputs with policy-aware framing.</p>
            </div>
            <div class="chat-actions-wrap">
              <button class="btn-secondary" data-copy-last type="button" style="height:32px;padding:0 12px;font-size:0.8125rem;">Copy last</button>
              <button class="btn-secondary" data-export-chat type="button" style="height:32px;padding:0 12px;font-size:0.8125rem;">Export</button>
              <button class="btn-secondary" data-rename-chat type="button" style="height:32px;padding:0 12px;font-size:0.8125rem;">Rename</button>
              <button class="btn-secondary" data-delete-chat type="button" style="height:32px;padding:0 12px;font-size:0.8125rem;">Delete</button>
            </div>
          </header>

          <section class="chat-body" data-message-list></section>

          <form class="composer" data-chat-form>
            <div class="composer-box card">
              <label class="muted" for="chat-input">Your decision question</label>
              <textarea id="chat-input" data-chat-input placeholder="Describe your decision context, constraints, and timeline."></textarea>
              <div class="composer-footer">
                <div class="status-inline"><i></i><span>Local save enabled. API used when available.</span></div>
                <div>Press <span class="kbd">Enter</span> to send</div>
                <button class="btn" type="submit" style="height:34px;padding:0 20px;font-size:0.8125rem;">Send</button>
              </div>
            </div>
          </form>
        </section>

      </div>
    </main>

    <script type="module" src="/js/chat-page.js"></script>
  </body>
</html>
