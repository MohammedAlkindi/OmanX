<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png" />
    <link rel="icon" type="image/svg+xml" href="/assets/icon.svg" />
    <link rel="manifest" href="/assets/site.webmanifest" />
    <title>OmanX Workspace</title>
    <meta name="description" content="Structured workspace for policy-aware decision guidance." />
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <body>
    <!-- Navigation — sticky, frosted -->
    <nav>
      <a class="nav-logo" href="/">Oman<span>X</span></a>
      <div class="nav-right">
        <a class="nav-cta" href="/">← Home</a>
        <button class="nav-hamburger" data-mobile-toggle aria-label="Open menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
      <div class="nav-drawer" data-mobile-panel>
        <a href="/">Home</a>
        <a href="/workspace">Product</a>
        <a href="/system">System</a>
        <a href="/vision">Roadmap</a>
        <a href="/contact">Contact</a>
      </div>
    </nav>

    <main class="page-shell">
      <div class="container app-layout">

        <!-- Sidebar — conversation history -->
        <aside class="sidebar" data-chat-sidebar>
          <div class="sidebar-inner">
            <div class="sidebar-header">
              <div>
                <div class="muted">Conversations</div>
                <h3>Decision history</h3>
              </div>
              <button class="btn" data-new-chat type="button" style="height:32px;padding:0 14px;font-size:0.8125rem;">New</button>
            </div>

            <label class="muted" for="chat-search">Search</label>
            <input id="chat-search" class="sidebar-search" data-chat-search type="search" placeholder="Search conversations" />

            <div class="chat-list" data-chat-list></div>
          </div>

          <div class="sidebar-footer">
            <button class="settings-trigger" data-settings-toggle type="button">
              <span class="settings-icon">⚙</span>
              <span>Settings</span>
            </button>
          </div>

          <!-- Settings panel — slides in over the sidebar -->
          <div class="settings-panel" data-settings-panel>
            <div class="settings-panel-header">
              <div>
                <div class="settings-panel-eyebrow">Workspace</div>
                <h3>Settings</h3>
              </div>
              <button class="settings-panel-close" data-settings-close type="button" aria-label="Close settings">✕</button>
            </div>

            <div class="settings-panel-body">

              <!-- Appearance -->
              <div class="settings-section">
                <div class="settings-section-label">Appearance</div>
                <div class="theme-picker" role="group" aria-label="Theme">
                  <button class="theme-btn" data-set-theme="light" type="button">Light</button>
                  <button class="theme-btn" data-set-theme="dark" type="button">Dark</button>
                  <button class="theme-btn" data-set-theme="system" type="button">System</button>
                </div>
              </div>

              <!-- Profile -->
              <div class="settings-section">
                <div class="settings-section-label">Profile</div>
                <div class="settings-field">
                  <label for="settings-name">Display name</label>
                  <input id="settings-name" class="settings-input" type="text" data-setting-name placeholder="Your name" autocomplete="off" />
                </div>
              </div>

              <!-- Assistant -->
              <div class="settings-section">
                <div class="settings-section-label">Assistant</div>
                <div class="settings-field">
                  <label for="settings-context">Custom context</label>
                  <textarea id="settings-context" class="settings-textarea" data-setting-context rows="3" placeholder="Tell the assistant about your situation, goals, or preferences…"></textarea>
                </div>
                <label class="toggle-row">
                  <input class="toggle-checkbox" type="checkbox" data-setting-concise />
                  <span class="toggle-track"><span class="toggle-thumb"></span></span>
                  <span class="toggle-label">Concise replies</span>
                </label>
                <div class="settings-field">
                  <label for="settings-model">Model</label>
                  <select id="settings-model" class="settings-select" data-setting-model>
                    <option value="claude-sonnet-4-6">Sonnet 4.6 — Recommended</option>
                    <option value="claude-haiku-4-5-20251001">Haiku 4.5 — Faster</option>
                  </select>
                </div>
                <div class="settings-field">
                  <label for="settings-language">Response language</label>
                  <select id="settings-language" class="settings-select" data-setting-language>
                    <option value="auto">Auto — match my language</option>
                    <option value="English">English</option>
                    <option value="Arabic">Arabic (العربية)</option>
                    <option value="French">French (Français)</option>
                    <option value="Spanish">Spanish (Español)</option>
                    <option value="German">German (Deutsch)</option>
                    <option value="Chinese">Chinese (中文)</option>
                    <option value="Japanese">Japanese (日本語)</option>
                    <option value="Korean">Korean (한국어)</option>
                    <option value="Portuguese">Portuguese (Português)</option>
                    <option value="Russian">Russian (Русский)</option>
                    <option value="Turkish">Turkish (Türkçe)</option>
                    <option value="Malay">Malay (Bahasa Melayu)</option>
                    <option value="Indonesian">Indonesian (Bahasa Indonesia)</option>
                    <option value="Hindi">Hindi (हिंदी)</option>
                    <option value="Urdu">Urdu (اردو)</option>
                    <option value="Persian">Persian (فارسی)</option>
                    <option value="Italian">Italian (Italiano)</option>
                    <option value="Dutch">Dutch (Nederlands)</option>
                    <option value="Polish">Polish (Polski)</option>
                    <option value="Swahili">Swahili (Kiswahili)</option>
                  </select>
                </div>
              </div>

              <!-- Data -->
              <div class="settings-section">
                <div class="settings-section-label">Data</div>
                <label class="toggle-row">
                  <input class="toggle-checkbox" type="checkbox" data-setting-data-consent />
                  <span class="toggle-track"><span class="toggle-thumb"></span></span>
                  <span class="toggle-label">Help improve OmanX by sharing conversations</span>
                </label>
                <div class="settings-field">
                  <label>Chat history</label>
                  <button type="button" class="btn-settings-danger" data-delete-all-chats>Delete all conversations</button>
                </div>
              </div>

            </div>
          </div>
        </aside>

        <!-- Main chat area -->
        <section class="assistant-shell" aria-label="Decision workspace">
          <div class="mobile-chat-bar">
            <button class="btn-ghost sidebar-toggle-btn" data-sidebar-toggle type="button">≡ Conversations</button>
          </div>

          <section class="chat-body" data-message-list></section>

          <button class="scroll-bottom-btn" data-scroll-bottom type="button" hidden aria-label="Scroll to bottom">↓</button>

          <form class="composer" data-chat-form>
            <div class="composer-box card">
              <textarea id="chat-input" data-chat-input placeholder="Describe your decision context, constraints, and timeline."></textarea>
              <div class="composer-footer">
                <div class="status-inline"><i data-status-dot></i><span data-status-text>Ready</span></div>
                <div>Press <span class="kbd">Enter</span> to send</div>
                <button class="btn" type="submit" data-send-btn style="height:34px;padding:0 20px;font-size:0.8125rem;">Send</button>
              </div>
            </div>
          </form>
        </section>

      </div>
    </main>

    <script type="module" src="/js/chat-page.js"></script>
  </body>
</html>
