<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png" />
    <link rel="icon" type="image/svg+xml" href="/assets/icon.svg" />
    <link rel="manifest" href="/assets/site.webmanifest" />
    <title>Page Not Found · OmanX</title>
    <meta name="description" content="The page you requested could not be found." />
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <body class="error-page">
    <main class="error-shell" role="main">
      <!-- gold mono error code -->
      <p class="error-code">404 · Not found</p>
      <h1>We can't find that page.</h1>
      <p>The address might be incorrect, or the page may have moved.</p>
      <div class="error-actions">
        <a class="btn" href="/">Go to homepage</a>
        <a class="btn-secondary" href="/workspace">Open workspace</a>
      </div>
    </main>
  </body>
</html>
