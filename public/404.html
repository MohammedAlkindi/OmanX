<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found · OmanX</title>
    <meta name="description" content="The page you requested could not be found." />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="error-page">
    <main class="container error-shell" role="main">
      <p class="error-code">404</p>
      <h1>We can’t find that page.</h1>
      <p>The address might be incorrect, or the page may have moved.</p>
      <div class="error-actions">
        <a class="btn" href="/">Go to homepage</a>
        <a class="btn-secondary" href="/workspace">Open workspace</a>
      </div>
    </main>
  </body>
</html>
